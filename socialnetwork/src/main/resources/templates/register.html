<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S'inscrire - ISEP Connect</title>
    <link rel="stylesheet" th:href="@{/css/charteGraphique.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
<div th:replace="~{fragments/header :: header-fragment}"></div>
<div class="login-page">
    <main class="login-container" style="max-width: 650px;"> <div class="login-card glass-effect">
        <div class="login-header">
            <div class="logo-circle">
                <i data-lucide="user-plus" class="icon-primary"></i>
            </div>
            <h2>Créer un compte</h2>
            <p class="subtitle">Rejoignez la communauté exclusive de l'ISEP.</p>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post" class="login-form">

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group">
                    <label for="username">Nom d'utilisateur</label>
                    <div class="input-wrapper">
                        <i data-lucide="at-sign" class="input-icon"></i>
                        <input id="username" th:field="*{username}" type="text" placeholder="adupont" required />
                    </div>
                    <span id="usernameMsg" class="msg-error-tiny"></span>
                </div>

                <div class="input-group">
                    <label for="email">Email ISEP</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input id="email" th:field="*{email}" type="email" placeholder="prenom.nom@isep.fr" required />
                    </div>
                    <span id="emailMsg" class="msg-error-tiny"></span>
                </div>


                <div class="form-group">
                    <label for="passwordHash">Mot de passe</label>
                    <input id="passwordHash" type="password" th:field="*{passwordHash}" class="input-field" placeholder="Choisissez un mot de passe" required />
                    <span id="passwordHashMsg" class="msg-error" style="display:none" role="alert" aria-live="polite"></span>
                </div>

                <div class="form-group">
                    <label for="firstName">Prénom</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" class="input-icon"></i>
                        <input id="firstName" th:field="*{firstName}" type="text" placeholder="Alex" />
                    </div>
                </div>

                <div class="input-group">
                    <label for="lastName">Nom</label>
                    <div class="input-wrapper">
                        <i data-lucide="users" class="input-icon"></i>
                        <input id="lastName" th:field="*{lastName}" type="text" placeholder="Dupont" />
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label for="passwordHash">Mot de passe</label>
                <div class="input-wrapper">
                    <i data-lucide="shield-check" class="input-icon"></i>
                    <input id="passwordHash" th:field="*{passwordHash}" type="password" placeholder="Mot de passe complexe" required />
                </div>
                <span id="passwordHashMsg" class="msg-error-tiny"></span>
            </div>

            <div class="input-group">
                <label for="bio">Bio (optionnel)</label>
                <div class="input-wrapper">
                    <i data-lucide="pencil" class="input-icon" style="top: 15px;"></i>
                    <textarea id="bio" th:field="*{bio}" rows="2" style="padding-left: 42px; padding-top: 10px; width: 100%; background: #00000033; border: 1px solid var(--border); border-radius: 12px; color: white;" placeholder="Dites-nous en plus..."></textarea>
                </div>
            </div>

            <button type="submit" class="btn-login-submit">
                <span>Créer mon compte</span>
                <i data-lucide="rocket"></i>
            </button>
        </form>

        <div class="login-footer">
            <p>Déjà inscrit ? <a th:href="@{/login}">Se connecter</a></p>
            <a th:href="@{/}" class="back-home"><i data-lucide="chevron-left"></i> Retour à l'accueil</a>
        </div>
    </div>
</main>

<script>
    (function(){
        const emailInput = document.getElementById('email');
        const usernameInput = document.getElementById('username');
        const emailMsg = document.getElementById('emailMsg');
        const usernameMsg = document.getElementById('usernameMsg');
        const passwordHashInput = document.getElementById('passwordHash')
        const passwordHashMsg = document.getElementById('passwordHashMsg');
        
        const emailRegex = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@(eleve\.isep\.fr|isep\.fr|ext\.isep\.fr)$/i;
        const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/;

        function setState(el, msgEl, ok, message){
            el.classList.remove('success','error');
            if(ok){
                el.classList.add('success');
                msgEl.style.display = 'none';
            } else {
                el.classList.add('error');
                msgEl.textContent = message || '';
                msgEl.style.display = 'block';
            }
        }

        // email validation
        emailInput.addEventListener('input', function(){
            const val = this.value.trim();
            if(val.length === 0){
                this.classList.remove('success','error');
                emailMsg.style.display='none';
                return;
            }
            if(emailRegex.test(val)){
                setState(this, emailMsg, true);
            } else {
                setState(this, emailMsg, false, "L'email doit être une adresse ISEP (eleve.isep.fr, isep.fr, ext.isep.fr)");
            }
        });

        // username uniqueness check with debounce
        let timer = null;
        usernameInput.addEventListener('input', function(){
            const val = this.value.trim();
            clearTimeout(timer);
            if(val.length === 0){
                this.classList.remove('success','error');
                usernameMsg.style.display='none';
                return;
            }
            timer = setTimeout(async ()=>{
                try{
                    const resp = await fetch('/api/check-username?username='+encodeURIComponent(val));
                    if(resp.ok){
                        const data = await resp.json();
                        if(data.exists){
                            setState(usernameInput, usernameMsg, false, 'Username already taken');
                        } else {
                            setState(usernameInput, usernameMsg, true);
                        }
                    } else {
                        // on error, mark neutral
                        usernameInput.classList.remove('success','error');
                        usernameMsg.style.display='none';
                    }
                }catch(e){
                    usernameInput.classList.remove('success','error');
                    usernameMsg.style.display='none';
                }
            }, 450);
        });
        
        
        passwordHashInput.addEventListener('input', function(){
            const val = this.value.trim();
            if(val.length === 0){
                this.classList.remove('success','error');
                usernameMsg.style.display='none';
                return;
            }
            
            if(passwordRegex.test(val)){
                setState(this, passwordHashMsg, true);
            } else {
                setState(this, passwordHashMsg, false, "Le mot de passe doit contenir au moins 8 caractères, avec au moins une majuscule, une minuscule, un chiffre et un caractère spécial");
            }
        });
        
    })();
</script>

</body>
</html>
